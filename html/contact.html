    <!-- Googleサービスへ通知する内容おわり -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const osField = document.getElementById('os');
            const browserField = document.getElementById('browser');
            const submitButton = document.querySelector('button[type="submit"]');
            const form = document.getElementById('my-form');
    
            // Detect OS
            const os = (() => {
                const userAgent = window.navigator.userAgent;
                if (userAgent.indexOf('Windows NT') !== -1) return 'Windows';
                if (userAgent.indexOf('Mac OS X') !== -1) return 'mac';
                if (userAgent.indexOf('CrOS') !== -1) return 'ChromeOS';
                if (userAgent.indexOf('Android') !== -1) return 'Android';
                if (/iPad|iPhone|iPod/.test(userAgent)) return 'iOS';
                if (userAgent.indexOf('Linux') !== -1) return 'Linux';
                return 'OtherOS';
            })();
            osField.value = os;
    
            // Detect Browser with build number
            const browser = (() => {
                const userAgent = window.navigator.userAgent;
                if (userAgent.indexOf('Edg') !== -1) {
                    const buildNumber = userAgent.match(/Edg\/(\d+)/);
                    return `Edge ${buildNumber ? buildNumber[1] : 'Unknown'}`;
                }
                if (userAgent.indexOf('Chrome') !== -1 && userAgent.indexOf('Edg') === -1) {
                    const buildNumber = userAgent.match(/Chrome\/(\d+)/);
                    return `Chrome ${buildNumber ? buildNumber[1] : 'Unknown'}`;
                }
                if (userAgent.indexOf('Firefox') !== -1) {
                    const buildNumber = userAgent.match(/Firefox\/(\d+)/);
                    return `Firefox ${buildNumber ? buildNumber[1] : 'Unknown'}`;
                }
                if (userAgent.indexOf('Opera') !== -1 || userAgent.indexOf('OPR') !== -1) {
                    const buildNumber = userAgent.match(/(Opera|OPR)\/(\d+)/);
                    return `Opera ${buildNumber ? buildNumber[2] : 'Unknown'}`;
                }
                if (userAgent.indexOf('Trident') !== -1) {
                    const buildNumber = userAgent.match(/rv:(\d+)/);
                    return `IE ${buildNumber ? buildNumber[1] : 'Unknown'}`;
                }
                if (userAgent.indexOf('Safari') !== -1 && userAgent.indexOf('Chrome') === -1) {
                    const buildNumber = userAgent.match(/Version\/(\d+)/);
                    return `Safari ${buildNumber ? buildNumber[1] : 'Unknown'}`;
                }
                return 'Other Browser';
            })();
            browserField.value = browser;
    
            // Make OS and Browser fields read-only
            osField.readOnly = true;
            browserField.readOnly = true;
    
            // Validate form
            form.addEventListener('input', () => {
                const isValid = form.checkValidity();
                submitButton.disabled = !isValid;
            });
    
            // Pre-fill form fields from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            urlParams.forEach((value, key) => {
                const inputField = document.querySelector(`[name="${key}"]`);
                if (inputField) {
                    inputField.value = value;
                }
            });
    
            // Redirect on submit after form submission
            form.addEventListener('submit', (event) => {
                event.preventDefault();
                const formData = new FormData(form);
                const queryString = new URLSearchParams(formData).toString();
                const actionUrl = form.action + '?' + queryString;
                fetch(actionUrl, {
                    method: 'POST',
                    mode: 'no-cors'
                }).then(() => {
                    window.location.href = 'https://hassu-s.github.io/linklike/inhtml/maintenance';
                });
            });
        });
    </script>

<body>
    <form id="my-form" action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSc9tUp_CTiKqADmkJCpB_3V72LhOk2uwBJVe3q5LZNVup0EcA/formResponse">

            <label for="mail">メールアドレス</label><br>

        </p>
        <p class="input-form">
            <label for="name">ペンネーム</label><br>
            <input type="text" name="entry.1644149207" id="name" class="input-text1" required>
        </p>
        <p class="input-form">
            <label for="os">OS種別</label><br>
            <input type="text" name="entry.634101136" id="os" class="input-text1" required>
        </p>
        <p class="input-form">
            <label for="browser">ブラウザ種別</label><br>
            <input type="text" name="entry.506368461" id="browser" class="input-text1" required>
        </p>
        <p class="input-form">
            <label for="list">お問い合わせ種別</label><br>
                <select class="input-text2" name="entry.903170547" required>
                    <option value="ご意見・ご要望">ご意見・ご要望</option>
                    <option value="不具合の報告">不具合の報告</option>
                    <option value="誤りの報告">誤りの報告</option>
                    <option value="開発参加申請">開発参加申請</option>
                    <option value="その他">その他</option>
                </select>
        </p>
        <p class="input-form">
            <label for="text">お問い合わせ内容</label><br>
            <textarea class="input-text2" name="entry.1675059586" id="text" class="input-text1" required></textarea>
        </p>
        <p class="input-form">
            <label><input type="checkbox" name="entry.365828283" class="check" value="プライバシーポリシーに同意" required /><span> プライバシーポリシーに同意</span></label>
        </p>
        <p class="input-form"><button type="submit" class="btn" disabled>送信</button></p>
    </form>
