<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Data Display</title>
    <style>
        .box {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            width: 200px;
            height: 200px;
            text-align: center;
            vertical-align: top;
        }
        .box img {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
        async function fetchCSV(url) {
            const response = await fetch(url);
            const text = await response.text();
            return text.split('\n').map(row => row.split(','));
        }

        function createBox(content, imageUrl, tooltip) {
            const box = document.createElement('div');
            box.className = 'box';

            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.alt = tooltip;
                img.title = tooltip;
                box.appendChild(img);
            } else {
                box.textContent = content;
            }

            return box;
        }

        async function displayData() {
            const itemData = await fetchCSV('../csv/item.csv');
            const itemIdData = await fetchCSV('../csv/item-id.csv');
            const contentDiv = document.getElementById('content');

            itemData.forEach(itemRow => {
                const code = itemRow.slice(4, 16).find(cell => cell !== '-');
                if (code) {
                    const itemIdRow = itemIdData.find(row => row[0] === code);
                    if (itemIdRow) {
                        const imageUrl = itemIdRow[3];
                        const tooltip = itemIdRow[4];
                        const box = createBox(code, imageUrl, tooltip);
                        contentDiv.appendChild(box);
                    }
                }
            });
        }

        displayData();
    </script>
</body>
</html>
