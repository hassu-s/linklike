<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Data Display</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 90%;
        }
        .box {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            text-align: left;
        }
        .box img {
            width: 20px;
            height: 20px;
            margin-left: 10px;
        }
        .box .text {
            font-size: 14px;
            margin-bottom: 10px;
        }
        .box .text span {
            margin-right: 10px;
        }
        .box .text .dash {
            margin-right: 10px;
            margin-left: 10px;
        }
        .box .items {
            display: flex;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container" id="content"></div>

    <script>
        async function fetchCSV(url) {
            const response = await fetch(url);
            const text = await response.text();
            return text.split('\n').slice(1).map(row => row.split(',')); // Skip the first row
        }

        function createBox(content, items) {
            const box = document.createElement('div');
            box.className = 'box';

            const text = document.createElement('div');
            text.className = 'text';
            const [a, b, c, d] = content.split(' ');
            text.innerHTML = `<span>${a}</span><span>${b}</span><span class="dash"></span><span>${c}</span>-<span>${d}</span>`;
            box.appendChild(text);

            const itemsDiv = document.createElement('div');
            itemsDiv.className = 'items';
            items.forEach(item => {
                const img = document.createElement('img');
                img.src = item.imageUrl;
                img.alt = item.tooltip;
                img.title = item.tooltip;
                itemsDiv.appendChild(img);
            });
            box.appendChild(itemsDiv);

            return box;
        }

        async function displayData() {
            const itemData = await fetchCSV('../csv/item.csv');
            const itemIdData = await fetchCSV('../csv/item-id.csv');
            const contentDiv = document.getElementById('content');

            itemData.forEach(itemRow => {
                const textContent = itemRow.slice(0, 4).join(' ');
                const codes = itemRow.slice(4, 16).filter(cell => cell !== '-');
                if (codes.length > 0) {
                    const items = codes.map(code => {
                        const itemIdRow = itemIdData.find(row => row[0] === code);
                        return itemIdRow ? { imageUrl: itemIdRow[3], tooltip: itemIdRow[4] } : null;
                    }).filter(item => item !== null);
                    const box = createBox(textContent, items);
                    contentDiv.appendChild(box);
                }
            });
        }

        displayData();
    </script>
</body>
</html>
