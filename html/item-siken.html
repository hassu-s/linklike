<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Data Display</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 90%;
        }
        .box {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            display: flex;
            align-items: center;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            text-align: left;
        }
        .box img {
            width: 20px;
            height: 20px;
            margin-left: 10px;
        }
        .box .text {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container" id="content"></div>

    <script>
        async function fetchCSV(url) {
            const response = await fetch(url);
            const text = await response.text();
            return text.split('\n').map(row => row.split(','));
        }

        function createBox(content, imageUrl, tooltip) {
            const box = document.createElement('div');
            box.className = 'box';

            const text = document.createElement('div');
            text.className = 'text';
            text.textContent = content;
            box.appendChild(text);

            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.alt = tooltip;
                img.title = tooltip;
                box.appendChild(img);
            }

            return box;
        }

        async function displayData() {
            const itemData = await fetchCSV('../csv/item.csv');
            const itemIdData = await fetchCSV('../csv/item-id.csv');
            const contentDiv = document.getElementById('content');

            itemData.forEach(itemRow => {
                const textContent = itemRow.slice(0, 4).join(' ');
                const codes = itemRow.slice(4, 16).filter(cell => cell !== '-');
                if (codes.length > 0) {
                    const box = createBox(textContent, null, '');
                    codes.forEach(code => {
                        const itemIdRow = itemIdData.find(row => row[0] === code);
                        if (itemIdRow) {
                            const imageUrl = itemIdRow[3];
                            const tooltip = itemIdRow[4];
                            const img = document.createElement('img');
                            img.src = imageUrl;
                            img.alt = tooltip;
                            img.title = tooltip;
                            box.appendChild(img);
                        }
                    });
                    contentDiv.appendChild(box);
                }
            });
        }

        displayData();
    </script>
</body>
</html>
