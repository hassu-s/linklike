<body>
    <div class="navbar">
        <a class="alink1" href="#" id="filterLink1"><button class="button1"><img id="img" class="img" src="../image/button/filterdata.png"></button></a>
        <label id="la1"><input type="checkbox" id="lowProbability" class="la0" checked> 低確率アイテム表示</label>
    </div>
    <div class="container" id="content"></div>

    <div class="overlay" id="overlay"></div>
    <div class="popup" id="popup">
        <div class="header">
            <h4 id="h4-2">絞り込み</h4>
        </div>
        <div class="popup-content">
            <div>
                <h4>学期 絞り込み</h4>
                <label><input type="checkbox" id="term103"> 103期</label>
                <label><input type="checkbox" id="term104"> 104期</label>
            </div>
            <hr class="hr1">
            <div>
                <h4>種別 絞り込み</h4>
                <label><input type="checkbox" id="g"> <img src="sample.png" alt="g"> 技能書類</label>
                <label><input type="checkbox" id="p"> <img src="sample.png" alt="p"> ピース類</label>
                <label><input type="checkbox" id="c"> <img src="sample.png" alt="c"> チャーム類</label>
                <label><input type="checkbox" id="y"> <img src="sample.png" alt="y"> ユメシリーズ</label>
            </div>
            <hr class="hr1">
            <div>
                <h4>レベル 絞り込み</h4>
                <label><input type="checkbox" id="1"> <img src="sample.png" alt="1"> R1</label>
                <label><input type="checkbox" id="2"> <img src="sample.png" alt="2"> R2</label>
                <label><input type="checkbox" id="3"> <img src="sample.png" alt="3"> R3</label>
                <label><input type="checkbox" id="4"> <img src="sample.png" alt="4"> R4/ユメシリーズ</label>
            </div>
            <hr class="hr1">
            <div>
                <h4>アイテム 絞り込み</h4>
                <label><input type="checkbox" id="gb"> <img src="sample.png" alt="gb"> 技能書</label>
                <label><input type="checkbox" id="ga"> <img src="sample.png" alt="ga"> ガーネットピース</label>
                <label><input type="checkbox" id="ca"> <img src="sample.png" alt="ca"> カーネリアンピース</label>
                <label><input type="checkbox" id="em"> <img src="sample.png" alt="em"> エメラルドピース</label>
                <label><input type="checkbox" id="di"> <img src="sample.png" alt="di"> ダイヤピース</label>
                <label><input type="checkbox" id="pe"> <img src="sample.png" alt="pe"> ペリドットピース</label>
                <label><input type="checkbox" id="ru"> <img src="sample.png" alt="ru"> ルビーピース</label>
                <label><input type="checkbox" id="sa"> <img src="sample.png" alt="sa"> サファイアピース</label>
                <label><input type="checkbox" id="to"> <img src="sample.png" alt="to"> トパーズピース</label>
                <label><input type="checkbox" id="tu"> <img src="sample.png" alt="tu"> ターコイズピース</label>
                <label><input type="checkbox" id="am"> <img src="sample.png" alt="am"> アメジストピース</label>
                <label><input type="checkbox" id="so"> <img src="sample.png" alt="so"> ソルチャーム</label>
                <label><input type="checkbox" id="lu"> <img src="sample.png" alt="lu"> ルナチャーム</label>
                <label><input type="checkbox" id="st"> <img src="sample.png" alt="st"> ステラチャーム</label>
                <label><input type="checkbox" id="ka"> <img src="sample.png" alt="ka"> ユメノカケラ</label>
                <label><input type="checkbox" id="ha"> <img src="sample.png" alt="ha"> ユメノハネ</label>
            </div>
        </div>
    </div>
    <div class="popup-buttons" id="popup-buttons">
        <button class="btn-b" id="resetButton">リセット</button>
        <button class="btn-b" id="cancelButton">キャンセル</button>
        <button class="btn-a" id="applyButton">OK</button>
    </div>

    <div class="position">
        <a class="alink1" href="#" id="filterLink2"><button class="button1"><img id="img" class="img" src="../image/button/filterdata.png"></button></a>
    </div>

    <script>
        let initialCheckboxStates = {};

        async function fetchCSV(url) {
            const response = await fetch(url);
            const text = await response.text();
            return text.split('\n').slice(1).map(row => row.split(',')); // Skip the first row
        }

        function createBox(content, items) {
            const box = document.createElement('div');
            box.className = 'box';

            const text = document.createElement('div');
            text.className = 'text';
            text.innerHTML = content;
            box.appendChild(text);

            const itemsDiv = document.createElement('div');
            itemsDiv.className = 'items';
            items.forEach(item => {
                const img = document.createElement('img');
                img.src = item.imageUrl;
                img.alt = item.tooltip;
                img.title = item.tooltip;
                itemsDiv.appendChild(img);
            });

            box.appendChild(itemsDiv);
            return box;
        }

        async function loadContent(csvPath) {
            const csvData = await fetchCSV(csvPath);
            const container = document.getElementById('content');

            csvData.forEach(row => {
                const [content, ...itemsData] = row;
                const items = itemsData.map(itemData => {
                    const [imageUrl, tooltip] = itemData.split('|');
                    return { imageUrl, tooltip };
                });
                container.appendChild(createBox(content, items));
            });
        }

        function applyFilters() {
            const filters = document.querySelectorAll('.popup-content input[type="checkbox"]');
            filters.forEach(filter => {
                if (filter.checked) {
                    console.log(`Filter applied: ${filter.id}`);
                }
            });
        }

        function resetFilters() {
            const filters = document.querySelectorAll('.popup-content input[type="checkbox"]');
            filters.forEach(filter => {
                filter.checked = initialCheckboxStates[filter.id] || false;
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Load initial checkbox states
            document.querySelectorAll('.popup-content input[type="checkbox"]').forEach(checkbox => {
                initialCheckboxStates[checkbox.id] = checkbox.checked;
            });

            // Load content
            loadContent('items.csv');

            // Filter buttons
            document.getElementById('filterLink1').addEventListener('click', () => {
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('popup').style.display = 'block';
                document.getElementById('popup-buttons').style.display = 'block';
            });

            document.getElementById('filterLink2').addEventListener('click', () => {
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('popup').style.display = 'block';
                document.getElementById('popup-buttons').style.display = 'block';
            });

            document.getElementById('applyButton').addEventListener('click', () => {
                applyFilters();
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('popup').style.display = 'none';
                document.getElementById('popup-buttons').style.display = 'none';
            });

            document.getElementById('resetButton').addEventListener('click', () => {
                resetFilters();
            });

            document.getElementById('cancelButton').addEventListener('click', () => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('popup').style.display = 'none';
                document.getElementById('popup-buttons').style.display = 'none';
            });
        });
    </script>
</body>
</html>
