<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Info</title>
    <script>
        function getDeviceInfo() {
            var os = "Otr";
            var osVersion = "N/A";
            var browser = "OB";
            var browserVersion = "N/A";
            var deviceName = "Unknown";

            // Detect OS
            if (navigator.userAgent.indexOf("Win") != -1) {
                os = "Win";
                osVersion = "11"; // Example version, you may need to detect actual version
            } else if (navigator.userAgent.indexOf("Android") != -1) {
                os = "And";
            } else if (navigator.userAgent.indexOf("iPhone") != -1 || navigator.userAgent.indexOf("iPad") != -1) {
                os = "Ios";
            } else if (navigator.userAgent.indexOf("CrOS") != -1) {
                os = "Chr";
            } else if (navigator.userAgent.indexOf("Linux") != -1) {
                os = "Lin";
            }

            // Detect Browser
            var userAgent = navigator.userAgent;
            if (userAgent.indexOf("Edg") != -1) {
                browser = "ED";
                browserVersion = userAgent.match(/Edg\/(\d+\.\d+)/)[1];
            } else if (userAgent.indexOf("Chrome") != -1 && userAgent.indexOf("Edg") == -1 && userAgent.indexOf("OPR") == -1 && userAgent.indexOf("Brave") == -1 && userAgent.indexOf("Vivaldi") == -1) {
                browser = "CH";
                browserVersion = userAgent.match(/Chrome\/(\d+\.\d+)/)[1];
            } else if (userAgent.indexOf("Safari") != -1 && userAgent.indexOf("Chrome") == -1) {
                browser = "SA";
                browserVersion = userAgent.match(/Version\/(\d+\.\d+)/)[1];
            } else if (userAgent.indexOf("Firefox") != -1) {
                browser = "FI";
                browserVersion = userAgent.match(/Firefox\/(\d+\.\d+)/)[1];
            } else if (userAgent.indexOf("OPR") != -1) {
                browser = "OP";
                browserVersion = userAgent.match(/OPR\/(\d+\.\d+)/)[1];
            } else if (userAgent.indexOf("Brave") != -1) {
                browser = "BR";
                browserVersion = userAgent.match(/Chrome\/(\d+\.\d+)/)[1]; // Brave uses Chrome's version
            } else if (userAgent.indexOf("Vivaldi") != -1) {
                browser = "VI";
                browserVersion = userAgent.match(/Chrome\/(\d+\.\d+)/)[1]; // Vivaldi uses Chrome's version
            } else if (userAgent.indexOf("MSIE") != -1 || !!document.documentMode) {
                browser = "IE";
                browserVersion = userAgent.match(/MSIE (\d+\.\d+)/)[1];
            } else if (userAgent.indexOf("Chromium") != -1) {
                browser = "CM";
                browserVersion = userAgent.match(/Chromium\/(\d+\.\d+)/)[1];
            } else if (userAgent.indexOf("Firefox") != -1) {
                browser = "OF";
                browserVersion = userAgent.match(/Firefox\/(\d+\.\d+)/)[1];
            }

            // Detect Device Name
            if (navigator.userAgentData && navigator.userAgentData.platform) {
                deviceName = navigator.userAgentData.platform;
            } else {
                deviceName = navigator.platform;
            }

            var deviceInfo = os + osVersion + "/" + browser + "/" + browserVersion + "/" + deviceName;
            document.getElementById("deviceInfo").innerText = deviceInfo;

            // Prepare mailto link
            var mailtoLink = "mailto:hassus.linklikelovelive@gmail.com?subject=表示不具合に関する問い合わせ&body=" + encodeURIComponent(deviceInfo + "\n\n不具合内容に追加の説明が必要な際は以下にご記入ください\n\n※本メールは返信は行いません\n※不具合解消までにお時間をいただく場合がございますが、ご了承ください\n※早急にサイトを閲覧したい場合、別のブラウザやOSをご利用ください");
            document.getElementById("sendEmail").href = mailtoLink;
        }
    </script>
</head>
<body onload="getDeviceInfo()">
    <h1>Device Information</h1>
    <p id="deviceInfo">Loading...</p>
    <button id="sendEmail">メール送信</button>
</body>
</html>
