<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ニュースサイト</title>
    <script src="../linklike/javascript/IE.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .accordion {
            margin: 20px 0;
        }
        .accordion-item {
            border-bottom: 1px solid #ddd;
        }
        .accordion-item-header {
            padding: 15px;
            cursor: pointer;
            background-color: #f9f9f9;
            transition: background-color 0.3s ease, transform 0.3s ease;
            border-radius: 5px;
        }
        .accordion-item-header:hover {
            background-color: #e9e9e9;
            transform: scale(1.02);
        }
        .accordion-item-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
            padding: 0 15px;
            background-color: #fff;
        }
        .accordion-item-content p {
            margin: 15px 0;
        }
        .accordion-item.active .accordion-item-content {
            max-height: 200px; /* 必要に応じて調整 */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="accordion">
            <div class="accordion-item">
                <div class="accordion-item-header">ニュース1</div>
                <div class="accordion-item-content">
                    <p>ニュース1の内容がここに表示されます。</p>
                </div>
            </div>
            <div class="accordion-item">
                <div class="accordion-item-header">ニュース2</div>
                <div class="accordion-item-content">
                    <p>ニュース2の内容がここに表示されます。</p>
                </div>
            </div>
            <div class="accordion-item">
                <div class="accordion-item-header">ニュース3</div>
                <div class="accordion-item-content">
                    <p>ニュース3の内容がここに表示されます。</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.querySelectorAll('.accordion-item-header').forEach(item => {
            item.addEventListener('click', () => {
                const parent = item.parentElement;
                const content = item.nextElementSibling;
                parent.classList.toggle('active');
                if (parent.classList.contains('active')) {
                    content.style.maxHeight = content.scrollHeight + 'px';
                } else {
                    content.style.maxHeight = '0';
                }
            });
        });
    </script>
</body>
</html>
